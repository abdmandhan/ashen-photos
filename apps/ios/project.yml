name: AshenPhotos
options:
  bundleIdPrefix: test.ashen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  AshenPhotos:
    type: application
    platform: iOS
    sources:
      - AshenPhotos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: test.ashen.photos
        INFOPLIST_FILE: AshenPhotos/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
